version: '3.8'

services:
  calculation-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calculation-service
    ports:
      - "8081:8081"
    networks:
      - insurance-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/premium/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  insurance-network:
    name: insurance-network
    external: true